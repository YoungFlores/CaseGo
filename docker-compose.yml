services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    hostname: postgres
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  migrate:
    image: migrate/migrate
    container_name: migrate-service
    volumes:
      - ./Profile/migrations:/migrations
    command: -path=/migrations/ -database "postgres://dev_user:dev_password@postgres:5432/app_db?sslmode=disable" up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  app:
    build:
      context: ./Profile
      args:
        SERVICE_NAME: caseGo
    container_name: app-service
    env_file: Profile/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - app-network

networks:
  app-network:
    driver: bridge